<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>University 7 - Admin & Student Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#C8102E',       // Cougar Red
            'primary-dark': '#8B0F1B', // Darker red
            secondary: 'white',      // Charcoal
            accent: '#F5F5F5',// Light gray
            text_color: 'black',
            head_color: '#ADADAD',
            odd_color: '#EDEDED'
          },
          fontFamily: {
            sans: ['Inter var', 'system-ui', 'sans-serif']
          },
          boxShadow: {
            glow: '0 0 10px rgba(79, 70, 229, 0.4)'
          }
        }
      }
    };
  </script>

  <style>
    /* Scrollbar styling for output */
    #output::-webkit-scrollbar {
      width: 6px;
    }
    #output::-webkit-scrollbar-thumb {
      background-color: rgba(100, 116, 139, 0.5);
      border-radius: 3px;
    }
  </style>
</head>

<body class="bg-accent text-secondary antialiased min-h-screen">
  <div class="container mx-auto max-w-7xl p-6">
    <!-- Header -->
    <header class="text-center mb-10">
      <h1 class="text-4xl font-bold text-primary mb-2">University Admin & Student Portal</h1>
      <p class="text-text_color">COSC 3380 • Team 7</p>
    </header>

    <!-- Grid Layout -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <div class="space-y-8">
        <!-- Setup Section -->
        <section class="bg-primary rounded-2xl shadow-lg p-6 hover:shadow-secondary transition">
          <h2 class="text-2xl font-semibold mb-5 text-accent">Setup & Admin</h2>
          <div class="flex flex-wrap gap-3">
            <button onclick="run('/api/createTables')" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">Create Tables</button>
            <button onclick="run('/api/insertData')" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">Insert Sample Data</button>
            <button onclick="run('/api/openSemester')" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">Open Semester</button>
            <button onclick="run('/api/simulateEnrollments')" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">Simulation (50 Enrollments)</button>
            <button onclick="run('/api/browseStudents')" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">Browse Students</button>
            <button onclick="run('/api/browseSections')" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">Browse Sections</button>
            <button onclick="clearOutput()" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">Clear Output</button>
          </div>
        </section>

        <!-- Student Portal -->
        <section class="bg-primary rounded-2xl shadow-lg p-6 hover:shadow-secondary transition">
          <h2 class="text-2xl font-semibold mb-5 text-accent">Student Portal</h2>
          <div class="grid sm:grid-cols-2 gap-4 mb-5">
            <div>
              <label class="block text-sm mb-1 text-accent">Student ID</label>
              <input id="sid" placeholder="e.g., 1" class="block w-full rounded-lg border-gray-300 shadow-sm sm:text-sm focus:border-primary focus:ring-primary bg-accent text-text_color p-2" />
            </div>
            <div>
              <label class="block text-sm mb-1 text-accent">Section ID</label>
              <input id="sect" placeholder="e.g., 1" class="block w-full rounded-lg border-gray-300 shadow-sm sm:text-sm focus:border-primary focus:ring-primary bg-accent text-text_color p-2" />
            </div>
          </div>
          <div class="flex flex-wrap gap-3">
            <button onclick="enroll()" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">Enroll</button>
            <button onclick="pay()" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">Make Payment</button>
            <!-- Payment Modal / Div -->
<div id="paymentDiv" class="hidden fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center z-50">
  <div class="bg-accent p-6 rounded-2xl w-96 shadow-lg">
    <h3 class="text-xl font-semibold text-primary mb-4">Make Payment</h3>
    
    <p class="text-text_color">Your current outstanding balance: $<span id="currentBalance" class="text-text_color">0.00</span></p>
    
    <div class="mt-4 flex items-center gap-2">
      <input type="checkbox" id="fullBalance" class="h-4 w-4" />
      <label class= "text-text_color" for="fullBalance">Pay full balance</label>
    </div>
    
    <div class="mt-2">
      <label class="text-text_color">Amount to pay:</label>
      <input id="payAmount" type="number" class="text-text_color w-full rounded-lg p-2 border border-gray-300 focus:border-primary focus:ring-primary" />
    </div>

    <div class="mt-4 flex justify-between">
      <button onclick="makePayment()" class="px-4 py-2 bg-primary text-accent rounded-lg hover:bg-primary-dark">Pay</button>
      <button onclick="document.getElementById('paymentDiv').classList.add('hidden')" class="px-4 py-2 bg-gray-300 text-black rounded-lg hover:bg-gray-400">Cancel</button>
    </div>

    <p id="paymentResult" class="mt-4 text-sm text-black font-semibold"></p>
  </div>
</div>

            <button onclick="viewGrades()" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">View Grades</button>
            <button onclick="viewBill()" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">View Tuition Bill</button>
          </div>
        </section>

        <!-- Back Office -->
        <section class="bg-primary rounded-2xl shadow-lg p-6 hover:shadow-secondary transition">
          <h2 class="text-2xl font-semibold mb-5 text-accent">Back Office</h2>
          <div class="flex flex-wrap gap-3">
            <button onclick="run('/api/closeSemester')" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">Close Semester</button>
            <button onclick="run('/api/postRandomGrades')" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">Post Random Grades</button>
          </div>
        </section>

        <!-- Reports -->
        <section class="bg-primary rounded-2xl shadow-lg p-6 hover:shadow-secondary transition">
          <h2 class="text-2xl font-semibold mb-5 text-accent">Reports</h2>
          <div class="flex flex-wrap gap-3">
            <button onclick="run('/api/report/gpaPerStudent')" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">GPA per Student</button>
            <button onclick="run('/api/report/tuitionPerSemester')" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">Tuition per Semester</button>
            <button onclick="run('/api/report/instructorLoad')" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">Instructor Load</button>
            <button onclick="run('/api/report/studentsPerSection')" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">Students per Section</button>
            <button onclick="run('/api/report/outstandingBalances')" class="px-4 py-2 rounded-lg font-medium text-sm bg-accent text-primary hover:bg-secondary">Outstanding Balances</button>
          </div>
        </section>
      </div>

      <!-- Output Section -->
      <div class="lg:col-span-1">
        <div class="bg-accent rounded-2xl shadow-lg p-6 sticky top-8 w-full">
          <h2 class="text-3xl font-bold text-primary text-center mb-4">Output Log</h2>
          <div id="output" class="bg-accent rounded-lg p-4 h-[40rem] overflow-auto text-xs font-mono text-secondary border border-gray-300"></div>
        </div>
      </div>
    </div>

    <footer class="mt-10 text-center text-sm text-gray-500">
      Server must be running at <code>http://localhost:3000</code>
    </footer>
  </div>

  <!-- Script -->
  <script src="script.js"></script>
  <script>
    async function run(url) {
      try {
        const res = await fetch(url);
        const text = await res.text();
        const output = document.getElementById('output');

        // Try parsing JSON
        try {
          const data = JSON.parse(text);
          if (Array.isArray(data) && data.length > 0 && typeof data[0] === 'object') {
            const columns = Object.keys(data[0]).map(k => ({ key: k, label: k.replace(/_/g, ' ').toUpperCase() }));
            const sortKey = columns[0].key;
            data.sort((a,b) => (!isNaN(a[sortKey]) && !isNaN(b[sortKey])) ? a[sortKey]-b[sortKey] : (''+a[sortKey]).localeCompare(b[sortKey]));
            displayTable(data, columns);
            return;
          }
        } catch(e) {
          // Not JSON, treat as plain text
        }

        // Clear previous output
        output.innerHTML = '';

        // All messages in black
        const div = document.createElement('div');
        div.className = 'text-black font-semibold';
        div.innerHTML = text;
        output.appendChild(div);

      } catch(err) {
        const output = document.getElementById('output');
        const div = document.createElement('div');
        div.className = 'text-black font-semibold';
        div.innerHTML = '❌ Error: ' + err.message;
        output.appendChild(div);
      }
    }

    function displayTable(data, columns) {
      const output = document.getElementById('output');
      output.innerHTML = '';
      if (!data || data.length === 0) { 
        output.textContent = 'No data found.'; 
        return; 
      }

      const table = document.createElement('table');
      table.className = "min-w-full border border-gray-300 rounded-lg overflow-hidden";

      // Header
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      headerRow.className = "bg-head_color text-text_color";
      columns.forEach((col, idx) => {
        const th = document.createElement('th');
        th.textContent = col.label;
        th.className = "px-4 py-2 text-left border-b border-gray-300";
        if (idx === 0) th.style.width = "100px";    // Student ID
        if (idx === 1) th.style.width = "200px";   // Name
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      // Body
      const tbody = document.createElement('tbody');
      data.forEach((row, idx) => {
        const tr = document.createElement('tr');
        tr.className = idx % 2 === 0 ? "bg-accent text-text_color" : "bg-odd_color text-text_color/80";
        columns.forEach((col, idx) => {
          const td = document.createElement('td');
          td.textContent = row[col.key];
          td.className = "px-4 py-2 border-b border-gray-200";
          if (idx === 0) td.style.width = "10vw";
          if (idx === 1) td.style.width = "30vw";
          if (idx === 2) td.style.width = "30vw";
          if (idx === 3) td.style.width = "30";
      
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      output.appendChild(table);
    }

    function clearOutput() { document.getElementById('output').innerHTML = ''; }
    async function enrollAndPay() {
      const sid = document.getElementById('sid').value || '1';
      const sect = document.getElementById('sect').value || '1';
      run(`/api/enrollAndPay?student_id=${sid}&section_id=${sect}`);
    }
    function viewGrades() { const sid = document.getElementById('sid').value || '1'; run(`/api/grades?student_id=${sid}`); }
    function viewBill() { const sid = document.getElementById('sid').value || '1'; run(`/api/bill?student_id=${sid}`); }
  </script>
</body>
</html>
